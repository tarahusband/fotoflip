<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FotoFlip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="brand">Foto<span>Flip</span></div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="openMarketplaces()">Marketplaces</button>
    <button class="btn btn-primary" id="btnImport">+ Import Photos</button>
  </div>
</header>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <input type="search" class="sidebar-search" id="sidebarSearch" placeholder="Search items…">
      <div class="sidebar-filters">
        <button class="filter-btn active" data-filter="all">All<span id="countAll">—</span></button>
        <button class="filter-btn" data-filter="done">Ready<span id="countDone">—</span></button>
        <button class="filter-btn" data-filter="review">Review<span id="countReview">—</span></button>
        <button class="filter-btn" data-filter="draft">Draft<span id="countDraft">—</span></button>
        <button class="filter-btn" data-filter="failed">Error<span id="countError">—</span></button>
      </div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <main class="detail-panel">
    <div class="detail-empty" id="detailEmpty">
      <div class="detail-empty-icon">📷</div>
      <h3>Select an item</h3>
      <p>Click any item in the list to view and edit its details.</p>
    </div>
    <div class="detail-content hidden" id="detailContent"></div>
  </main>
</div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Import Photos</span>
      <button class="modal-close" id="importClose">✕</button>
    </div>
    <div class="modal-body" id="importBody"></div>
    <div class="modal-footer" id="importFooter"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="app.js"></script>
</body>
</html>
