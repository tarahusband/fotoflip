<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FotoFlip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <nav class="nav-rail">
    <div class="nav-brand">Foto<span>Flip</span></div>
    <div class="nav-items">
      <button class="nav-item active" data-view="photos" onclick="switchView('photos')" title="Photos & Listings">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span class="nav-label">Photos</span>
      </button>
      <button class="nav-item" data-view="inventory" onclick="switchView('inventory')" title="Inventory">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 3H8L6 7h12l-2-4z"/></svg>
        <span class="nav-label">Inventory</span>
      </button>
    </div>
    <div class="nav-footer">
      <button class="nav-footer-btn" onclick="openMarketplaces()" title="Marketplaces">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17"/><circle cx="16" cy="19" r="1"/><circle cx="9" cy="19" r="1"/></svg>
        <span class="nav-label">Markets</span>
      </button>
      <button class="nav-footer-btn nav-import" id="btnImport" title="Import Photos">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        <span class="nav-label">Import</span>
      </button>
    </div>
  </nav>

  <!-- Photos & Listings view (default) -->
  <div id="viewPhotos" class="view-panel app-layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <input type="search" class="sidebar-search" id="sidebarSearch" placeholder="Search items…">
        <div class="sidebar-filters">
          <button class="filter-btn active" data-filter="all">All<span id="countAll">—</span></button>
          <button class="filter-btn" data-filter="done">Ready<span id="countDone">—</span></button>
          <button class="filter-btn" data-filter="review">Review<span id="countReview">—</span></button>
          <button class="filter-btn" data-filter="draft">Draft<span id="countDraft">—</span></button>
          <button class="filter-btn" data-filter="failed">Error<span id="countError">—</span></button>
        </div>
      </div>
      <div class="sidebar-list" id="sidebarList"></div>
    </aside>

    <main class="detail-panel">
      <div class="detail-empty" id="detailEmpty">
        <div class="detail-empty-icon">📷</div>
        <h3>Select an item</h3>
        <p>Click any item in the list to view and edit its details.</p>
      </div>
      <div class="detail-content hidden" id="detailContent"></div>
    </main>
  </div>

  <!-- Inventory view -->
  <div id="viewInventory" class="view-panel hidden">
    <div class="inv-container">
      <div class="inv-topbar">
        <h2 class="inv-title">Inventory</h2>
        <div class="inv-topbar-actions">
          <input type="search" class="inv-search" id="invSearch" placeholder="Search title, SKU, location…">
          <button class="btn btn-sm btn-secondary" onclick="exportAllPoshmark(this)">⬇ Poshmark CSV</button>
          <button class="btn btn-sm btn-secondary" onclick="exportAllWhatnot(this)">⬇ Whatnot CSV</button>
        </div>
      </div>
      <div class="inv-stats" id="invStats"></div>
      <div class="inv-filters" id="invFilters"></div>
      <div class="inv-bulk-bar hidden" id="invBulkBar"></div>
      <div class="inv-table-wrap">
        <table class="inv-table" id="invTable">
          <thead>
            <tr>
              <th><input type="checkbox" id="invSelectAll" onclick="invToggleAll(this)"></th>
              <th></th>
              <th>Item</th>
              <th>SKU</th>
              <th>Location</th>
              <th>Status</th>
              <th>P</th>
              <th>W</th>
              <th>E</th>
              <th>Added</th>
              <th>Sold</th>
            </tr>
          </thead>
          <tbody id="invBody"></tbody>
        </table>
        <div class="inv-empty hidden" id="invEmpty">No items match the current filter.</div>
      </div>
    </div>
  </div>

</div><!-- /.app-shell -->

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Import Photos</span>
      <button class="modal-close" id="importClose">✕</button>
    </div>
    <div class="modal-body" id="importBody"></div>
    <div class="modal-footer" id="importFooter"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="app.js"></script>
</body>
</html>
